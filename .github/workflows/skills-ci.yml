name: Skills CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate SKILL.md frontmatter
        run: python tools/ci/structure_check.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Scan tracked files for secret-shaped patterns
        run: python tools/ci/secrets_scan.py

  fixture-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Replay test fixtures, check structure not wording
        run: python tools/ci/fixture_test.py

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # The skill scripts import their platform SDKs at module top, so the
      # unit tests (which import the real scripts to test the real functions,
      # not copies) need them installed even though no test ever connects
      # anywhere. Without this, every test died at import time on the bare
      # runner -- which kept this job silently red for 8 straight pushes
      # while local runs (where the SDKs exist) stayed green.
      - name: Install skill script dependencies
        run: pip install snowflake-connector-python databricks-sdk
      - name: Run per-skill unit tests (test_*.py under test-fixtures/)
        run: python tools/ci/unit_tests.py

  portability-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Lint SKILL.md bodies for vendor-specific/non-portable phrasing
        run: python tools/ci/portability_lint.py
