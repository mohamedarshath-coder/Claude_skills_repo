name: Skills CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate SKILL.md frontmatter
        run: python tools/ci/structure_check.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Scan tracked files for secret-shaped patterns
        run: python tools/ci/secrets_scan.py

  fixture-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Replay test fixtures, check structure not wording
        run: python tools/ci/fixture_test.py
